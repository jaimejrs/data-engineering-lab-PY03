version: 2

models:
  - name: dim_credor
    description: "Dimensão de credores (Type-1, uma linha por cnpj_cpf)."
    columns:
      - name: sk_credor
        tests: [not_null, unique]
      - name: tipo
        tests:
          - accepted_values:
              values: ['PF', 'PJ', 'INVALIDO']

  - name: dim_orgao
    description: "Dimensão de órgãos/unidades gestoras (uma linha por codigo+ano)."
    columns:
      - name: sk_orgao
        tests: [not_null, unique]

  - name: dim_modalidade
    columns:
      - name: sk_modalidade
        tests: [not_null, unique]

  - name: dim_tempo
    columns:
      - name: sk_tempo
        tests: [not_null, unique]
      - name: data
        tests: [not_null]

  - name: fato_contrato
    description: "Fato de contratos. SK nulas = sem match na dimensão (join fraco)."
    columns:
      - name: sk_credor
        tests:
          - relationships:
              to: ref('dim_credor')
              field: sk_credor
      - name: sk_orgao
        tests:
          - relationships:
              to: ref('dim_orgao')
              field: sk_orgao
      - name: sk_modalidade
        tests:
          - relationships:
              to: ref('dim_modalidade')
              field: sk_modalidade
      - name: sk_tempo
        tests:
          - relationships:
              to: ref('dim_tempo')
              field: sk_tempo

  - name: fato_empenho
    columns:
      - name: sk_orgao
        tests:
          - relationships:
              to: ref('dim_orgao')
              field: sk_orgao
      - name: sk_tempo
        tests:
          - relationships:
              to: ref('dim_tempo')
              field: sk_tempo
