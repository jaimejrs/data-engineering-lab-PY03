# Catálogo opcional — federação/ad-hoc contra o Postgres DW (ex: comparar a Gold
# Iceberg com o DW antigo, ou espelhar dados). Não é usado pela build da Gold.
connector.name=postgresql
connection-url=jdbc:postgresql://datalab_postgres_dw:5432/ceara_dw
connection-user=dw_user
connection-password=dw_password
