services:
  postgres:
    image: postgres:15
    container_name: datalab_postgres
    environment:
      POSTGRES_USER: dlab
      POSTGRES_PASSWORD: d123
      POSTGRES_DB: datalab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlab -d datalab"]
      interval: 10s
      retries: 5
      start_period: 5s

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: datalab_hadoop_namenode
    environment:
      - CLUSTER_NAME=datalab
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    restart: unless-stopped

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datalab_hadoop_datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    restart: unless-stopped

  airflow-init:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dlab:d123@postgres:5432/datalab
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      SOURCE_POSTGRES_URL: ${SOURCE_POSTGRES_URL:-postgresql://usuario:senha@host:5432/ceara_transparente}
      BRONZE_STORAGE_BACKEND: hdfs
      BRONZE_BASE_PATH: /bronze
      HDFS_WEBHDFS_URL: http://namenode:9870
      HDFS_USER: root
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Data --lastname Admin --role Admin --email admin@datalab.com || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs

  airflow-webserver:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    # Ver documentacao/workaround-egress-ipv4-api.md: o host não tem saída IPv4
    # (só IPv6), mas a API do Ceará Transparente é IPv4-only. Isto força o
    # hostname da API a resolver para um relay TCP alcançável via Tailscale.
    extra_hosts: &api-relay-host
      - "api-dados-abertos.cearatransparente.ce.gov.br:${API_EGRESS_RELAY_IP:-100.101.236.119}"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    extra_hosts: *api-relay-host
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:python-3.11
    container_name: datalab_jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=datalab
      - SOURCE_POSTGRES_URL=${SOURCE_POSTGRES_URL:-postgresql://usuario:senha@host:5432/ceara_transparente}
      - BRONZE_STORAGE_BACKEND=hdfs
      - BRONZE_BASE_PATH=/bronze
      - HDFS_WEBHDFS_URL=http://namenode:9870
      - HDFS_USER=root
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
    depends_on:
      - namenode
    restart: unless-stopped

volumes:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
  airflow_logs:
