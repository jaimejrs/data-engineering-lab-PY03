services:
  postgres:
    image: postgres:15
    container_name: datalab_postgres
    environment:
      POSTGRES_USER: dlab
      POSTGRES_PASSWORD: d123
      POSTGRES_DB: datalab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Provisiona o DB `metastore` do Hive (só em volume novo — ver
      # docker/postgres-init/01-metastore.sql para o fallback manual).
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlab -d datalab"]
      interval: 10s
      retries: 5
      start_period: 5s

  postgres_dw:
    image: postgres:15
    container_name: datalab_postgres_dw
    environment:
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: ceara_dw
    ports:
      - "5434:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_user -d ceara_dw"]
      interval: 10s
      retries: 5
      start_period: 5s

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: datalab_hadoop_namenode
    environment:
      - CLUSTER_NAME=datalab
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    restart: unless-stopped

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datalab_hadoop_datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    restart: unless-stopped

  airflow-init:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
      postgres_dw:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dlab:d123@postgres:5432/datalab
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      SOURCE_POSTGRES_URL: ${SOURCE_POSTGRES_URL:-postgresql://usuario:senha@host:5432/ceara_transparente}
      BRONZE_STORAGE_BACKEND: hdfs
      BRONZE_BASE_PATH: /bronze
      SILVER_STORAGE_BACKEND: hdfs
      SILVER_BASE_PATH: /silver
      HDFS_WEBHDFS_URL: http://namenode:9870
      HDFS_USER: root
      DW_POSTGRES_URL: postgresql://dw_user:dw_password@postgres_dw:5432/ceara_dw
      # Conexão usada pelo SparkSubmitOperator (DAGs 2 e 3) — cluster standalone.
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Data --lastname Admin --role Admin --email admin@datalab.com || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs

  airflow-webserver:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    # Ver documentacao/workaround-egress-ipv4-api.md: o host não tem saída IPv4
    # (só IPv6), mas a API do Ceará Transparente é IPv4-only. Isto força o
    # hostname da API a resolver para um relay TCP alcançável via Tailscale.
    extra_hosts: &api-relay-host
      - "api-dados-abertos.cearatransparente.ce.gov.br:${API_EGRESS_RELAY_IP:-100.101.236.119}"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./docker/airflow
      network: host  # necessário em hosts sem egress para as redes bridge do Docker (ver docker/airflow/README.md)
    image: datalab-airflow:local
    container_name: datalab_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    extra_hosts: *api-relay-host
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs
      # DAG 3 dispara o dbt via DockerOperator (imagem datalab-dbt) -> precisa do
      # socket do Docker. Ver documentacao/gold-dbt-trino.md (permissão do socket).
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:python-3.11
    container_name: datalab_jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=datalab
      - SOURCE_POSTGRES_URL=${SOURCE_POSTGRES_URL:-postgresql://usuario:senha@host:5432/ceara_transparente}
      - BRONZE_STORAGE_BACKEND=hdfs
      - BRONZE_BASE_PATH=/bronze
      - HDFS_WEBHDFS_URL=http://namenode:9870
      - HDFS_USER=root
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
    depends_on:
      - namenode
    restart: unless-stopped

  hive-metastore:
    build:
      context: ./docker/hive
      network: host  # host só tem IPv6; ver docker/airflow/README.md
    image: datalab-hive-metastore:local
    container_name: datalab_hive_metastore
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_started
    ports:
      - "9083:9083"
    restart: unless-stopped

  spark-master:
    build:
      context: ./docker/spark
      network: host
    image: datalab-spark:local
    container_name: datalab_spark_master
    entrypoint: ["/opt/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8081"]
    environment: &spark-env
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      ICEBERG_WAREHOUSE: hdfs://namenode:9000/warehouse
      HDFS_DEFAULT_FS: hdfs://namenode:9000
      BRONZE_BASE_PATH: /bronze
      DW_POSTGRES_URL: postgresql://dw_user:dw_password@postgres_dw:5432/ceara_dw
    ports:
      - "7077:7077"
      - "8081:8081"
    depends_on:
      - namenode
      - hive-metastore
    # Repo montado para execução manual/debug de jobs direto no cluster (local[*]).
    volumes:
      - ./src:/opt/datalab/src
      - ./sql:/opt/datalab/sql
    restart: unless-stopped

  spark-worker:
    build:
      context: ./docker/spark
      network: host
    image: datalab-spark:local
    container_name: datalab_spark_worker
    entrypoint: ["/opt/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081"]
    environment: *spark-env
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      - ./src:/opt/datalab/src
      - ./sql:/opt/datalab/sql
    restart: unless-stopped

  trino:
    build:
      context: ./docker/trino
      network: host
    image: datalab-trino:local
    container_name: datalab_trino
    depends_on:
      - hive-metastore
      - namenode
    ports:
      - "8085:8080"  # UI/HTTP do Trino (8080 já é do Airflow no host)
    restart: unless-stopped

  # dbt (adapter Trino) — não sobe no `up` (profile "tools"); é buildado e rodado
  # sob demanda: `docker compose run --rm dbt build`, ou pela DAG 3 via DockerOperator.
  dbt:
    build:
      context: ./dbt
      network: host
    image: datalab-dbt:local
    container_name: datalab_dbt
    profiles: ["tools"]
    depends_on:
      - trino
    volumes:
      - ./dbt:/dbt
    command: ["build"]

# Nome de rede fixo para o DockerOperator da DAG 3 referenciar de forma
# determinística (network_mode="datalab_net").
networks:
  default:
    name: datalab_net

volumes:
  postgres_data:
  postgres_dw_data:
  hadoop_namenode:
  hadoop_datanode:
  airflow_logs:
