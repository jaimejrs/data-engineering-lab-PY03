# Connector Iceberg apontando para o MESMO Hive Metastore que o Spark usa —
# Trino e Spark compartilham as tabelas lakehouse.* (multi-engine).
connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hive-metastore:9083
# Acesso ao HDFS (namenode) — core-site define fs.defaultFS.
fs.hadoop.enabled=true
hive.config.resources=/etc/trino/hadoop/core-site.xml
